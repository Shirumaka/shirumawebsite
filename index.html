<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SIUAMXD - Community</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; padding: 20px; }
        .card { border: 1px solid #444; padding: 20px; margin: 15px 0; border-radius: 10px; background: #1e1e1e; }
        #admin-form { display: none; border: 2px solid #ff4444; padding: 20px; margin-bottom: 20px; }
        input, button { display: block; width: 100%; margin: 10px 0; padding: 10px; }
        .like-btn { cursor: pointer; color: #00ffcc; }
    </style>
</head>
<body>
    <button onclick="login()" id="auth-btn">Googleでログイン</button>
    <div id="admin-form">
        <h3>管理者用：プリセット投稿</h3>
        <input id="title" placeholder="タイトル">
        <input id="desc" placeholder="説明文">
        <label>XML: <input type="file" id="xmlFile"></label>
        <label>GIF: <input type="file" id="gifFile"></label>
        <button onclick="uploadAndPost()">投稿実行</button>
    </div>
    <div id="presets-list"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithRedirect, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyADIlXZrVXBp7AqzQcFP9UUveg1Q5TXTcM",
            authDomain: "siuamxd-login.firebaseapp.com",
            projectId: "siuamxd-login",
            storageBucket: "siuamxd-login.firebasestorage.app",
            messagingSenderId: "682121103941",
            appId: "1:682121103941:web:b8480d5eb9d8e0cf75712c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const ADMIN_UID = "QPQAuqakssUodu2WqTYniJUFMBu2";

        window.login = () => signInWithRedirect(auth, new GoogleAuthProvider());

        onAuthStateChanged(auth, (user) => {
            if (user?.uid === ADMIN_UID) document.getElementById('admin-form').style.display = 'block';
        });

        window.uploadAndPost = async () => {
            const xmlFile = document.getElementById('xmlFile').files[0];
            const gifFile = document.getElementById('gifFile').files[0];
            const xmlRef = ref(storage, 'presets/' + Date.now());
            const gifRef = ref(storage, 'gifs/' + Date.now());
            
            await uploadBytes(xmlRef, xmlFile);
            await uploadBytes(gifRef, gifFile);
            
            await addDoc(collection(db, "presets"), {
                title: document.getElementById('title').value,
                desc: document.getElementById('desc').value,
                fileUrl: await getDownloadURL(xmlRef),
                gifUrl: await getDownloadURL(gifRef),
                likes: [],
                createdAt: new Date()
            });
            alert("投稿完了");
        };

        window.toggleLike = async (id) => {
            if (!auth.currentUser) return alert("ログインしてね");
            await updateDoc(doc(db, "presets", id), { likes: arrayUnion(auth.currentUser.uid) });
        };

        onSnapshot(query(collection(db, "presets"), orderBy("createdAt", "desc")), (snap) => {
            const list = document.getElementById('presets-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `
                    <div class="card">
                        <h3>${d.title}</h3>
                        <img src="${d.gifUrl}" width="300">
                        <p>${d.desc}</p>
                        <button onclick="window.open('${d.fileUrl}')">Download XML</button>
                        <p class="like-btn" onclick="toggleLike('${doc.id}')">❤️ ${d.likes?.length || 0}</p>
                    </div>`;
            });
        });
    </script>
</body>
</html>
