<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>砂テトリス</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Sans+JP:wght@300;400&display=swap');

:root {
  --bg: #0d0d14;
  --panel: #13131e;
  --border: #1e1e2e;
  --gold: #e0b84a;
  --dim: #3a3a55;
  --text: #9090b0;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DotGothic16', monospace;
  overflow: hidden;
}

/* scanline overlay */
body::after {
  content:'';
  position:fixed; inset:0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events:none; z-index:100;
}

#wrapper {
  display: flex;
  gap: 20px;
  align-items: flex-start;
}

#gameCanvas {
  display:block;
  image-rendering: pixelated;
  border: 1px solid var(--border);
  box-shadow: 0 0 40px rgba(224,184,74,0.06), inset 0 0 60px rgba(0,0,0,0.5);
}

.side-panel {
  width: 110px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.panel-box {
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 12px;
}

.panel-label {
  color: var(--dim);
  font-size: 9px;
  letter-spacing: 0.25em;
  margin-bottom: 6px;
  text-transform: uppercase;
}

.panel-value {
  color: var(--gold);
  font-size: 22px;
  letter-spacing: 0.05em;
}

#nextCanvas {
  display: block;
  image-rendering: pixelated;
  margin-top: 6px;
}

.btn {
  background: transparent;
  border: 1px solid var(--dim);
  color: var(--text);
  font-family: 'DotGothic16', monospace;
  font-size: 11px;
  letter-spacing: 0.15em;
  padding: 8px 12px;
  cursor: pointer;
  width: 100%;
  transition: all 0.15s;
}
.btn:hover { border-color: var(--gold); color: var(--gold); }

.controls-hint {
  color: var(--dim);
  font-size: 9px;
  line-height: 1.9;
  letter-spacing: 0.1em;
}

#overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(13,13,20,0.88);
  z-index: 10;
}

#overlay h2 {
  color: var(--gold);
  font-size: 20px;
  letter-spacing: 0.3em;
  margin-bottom: 20px;
}

#overlay p {
  color: var(--text);
  font-size: 11px;
  letter-spacing: 0.2em;
  margin-bottom: 6px;
}

.canvas-wrap {
  position: relative;
}
</style>
</head>
<body>

<div id="wrapper">
  <!-- Left panel -->
  <div class="side-panel">
    <div class="panel-box">
      <div class="panel-label">スコア</div>
      <div class="panel-value" id="scoreVal">0</div>
    </div>
    <div class="panel-box">
      <div class="panel-label">レベル</div>
      <div class="panel-value" id="levelVal">1</div>
    </div>
    <div class="panel-box">
      <div class="panel-label">ライン</div>
      <div class="panel-value" id="linesVal">0</div>
    </div>
  </div>

  <!-- Game canvas -->
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="gameCanvas"></canvas>
    <div id="overlay">
      <h2>砂テトリス</h2>
      <p>ブロックが着地すると砂に崩れる</p>
      <p style="margin-bottom:20px; color:#554">ラインが砂で埋まると消える</p>
      <button class="btn" id="startBtn" style="width:auto;padding:10px 30px;border-color:var(--gold);color:var(--gold)">START</button>
    </div>
  </div>

  <!-- Right panel -->
  <div class="side-panel">
    <div class="panel-box">
      <div class="panel-label">NEXT</div>
      <canvas id="nextCanvas"></canvas>
    </div>
    <button class="btn" id="pauseBtn">一時停止</button>
    <div class="panel-box">
      <div class="panel-label">操作</div>
      <div class="controls-hint">
        ← → 移動<br>
        ↑ 回転<br>
        ↓ 落下<br>
        スペース 即落
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// CONSTANTS
// ============================================================
const COLS = 12, ROWS = 22;
const CELL = 24; // px per cell (display)
const SAND_SCALE = 2; // each cell = 2x2 sand pixels → 24/2=12 sand px per cell
const SW = COLS * CELL, SH = ROWS * CELL; // canvas px

const canvas = document.getElementById('gameCanvas');
canvas.width = SW; canvas.height = SH;
const ctx = canvas.getContext('2d');

const nextCanvas = document.getElementById('nextCanvas');
const NEXT_CELL = 18;
nextCanvas.width = 4 * NEXT_CELL;
nextCanvas.height = 4 * NEXT_CELL;
const nctx = nextCanvas.getContext('2d');

// Sand grid: pixel resolution
const GW = COLS * (CELL / SAND_SCALE);   // 12*12 = 144
const GH = ROWS * (CELL / SAND_SCALE);   // 22*12 = 264
const SS = CELL / SAND_SCALE;            // sand pixels per cell side = 12

const EMPTY = 0, SAND = 1, WALL = 2;
const sandGrid = new Uint8Array(GW * GH);
const sandColor = new Uint32Array(GW * GH); // packed ABGR

// ============================================================
// TETROMINOS
// ============================================================
const PIECES = [
  { shape: [[1,1,1,1]], color: [0,220,220] },         // I
  { shape: [[1,1],[1,1]], color: [220,180,0] },         // O
  { shape: [[0,1,0],[1,1,1]], color: [160,0,220] },     // T
  { shape: [[1,0,0],[1,1,1]], color: [220,120,0] },     // L
  { shape: [[0,0,1],[1,1,1]], color: [0,80,220] },      // J
  { shape: [[0,1,1],[1,1,0]], color: [0,200,80] },      // S
  { shape: [[1,1,0],[0,1,1]], color: [220,40,40] },     // Z
];

function rotateCW(shape) {
  const R = shape.length, C = shape[0].length;
  return Array.from({length:C},(_,y)=>Array.from({length:R},(_,x)=>shape[R-1-x][y]));
}

// ============================================================
// GAME STATE
// ============================================================
let state = 'idle'; // idle | playing | paused | gameover
let score = 0, level = 1, lines = 0;
let dropTimer = 0, dropInterval = 600;
let piece = null, next = null;
let lastTime = 0;

function newPiece(type) {
  const p = PIECES[type ?? Math.floor(Math.random()*PIECES.length)];
  return {
    shape: p.shape.map(r=>[...r]),
    color: p.color,
    x: Math.floor(COLS/2) - Math.floor(p.shape[0].length/2),
    y: 0
  };
}

function spawnNext() {
  piece = next ?? newPiece();
  next = newPiece();
  if(collides(piece, piece.x, piece.y)) endGame();
}

function collides(p, px, py) {
  for(let r=0;r<p.shape.length;r++) for(let c=0;c<p.shape[r].length;c++) {
    if(!p.shape[r][c]) continue;
    const nx=px+c, ny=py+r;
    if(nx<0||nx>=COLS||ny>=ROWS) return true;
    if(ny>=0 && isCellOccupied(nx,ny)) return true;
  }
  return false;
}

// Check if any sand pixel in a cell
function isCellOccupied(cx, cy) {
  const sx=cx*SS, sy=cy*SS;
  for(let dy=0;dy<SS;dy++) for(let dx=0;dx<SS;dx++) {
    if(sandGrid[(sy+dy)*GW+(sx+dx)]!==EMPTY) return true;
  }
  return false;
}

// ============================================================
// SAND PHYSICS
// ============================================================
const gidx = (x,y) => y*GW+x;
const inG = (x,y) => x>=0&&x<GW&&y>=0&&y<GH;

let updateOrder = [];
for(let i=0;i<GW;i++) updateOrder.push(i);

function shuffleArr(a) {
  for(let i=a.length-1;i>0;i--){const j=Math.random()*i+1|0;[a[i],a[j]]=[a[j],a[i]];}
}

function updateSand() {
  shuffleArr(updateOrder);
  for(let y=GH-1;y>=0;y--) {
    for(let xi=0;xi<GW;xi++) {
      const x=updateOrder[xi];
      if(sandGrid[gidx(x,y)]!==SAND) continue;
      // fall down
      if(y<GH-1 && sandGrid[gidx(x,y+1)]===EMPTY) {
        sandColor[gidx(x,y+1)]=sandColor[gidx(x,y)];
        sandGrid[gidx(x,y+1)]=SAND; sandGrid[gidx(x,y)]=EMPTY; continue;
      }
      // diagonal
      const d=Math.random()<0.5?1:-1;
      for(const dd of [d,-d]) {
        const nx=x+dd, ny=y+1;
        if(inG(nx,ny)&&sandGrid[gidx(nx,ny)]===EMPTY) {
          sandColor[gidx(nx,ny)]=sandColor[gidx(x,y)];
          sandGrid[gidx(nx,ny)]=SAND; sandGrid[gidx(x,y)]=EMPTY; break;
        }
      }
    }
  }
}

// Convert piece cells to sand pixels on landing
function solidifyPiece(p) {
  const [r,g,b] = p.color;
  for(let row=0;row<p.shape.length;row++) for(let col=0;col<p.shape[row].length;col++) {
    if(!p.shape[row][col]) continue;
    const cx=p.x+col, cy=p.y+row;
    if(cy<0) continue;
    const sx=cx*SS, sy=cy*SS;
    for(let dy=0;dy<SS;dy++) for(let dx=0;dx<SS;dx++) {
      const i=gidx(sx+dx,sy+dy);
      sandGrid[i]=SAND;
      // color variation
      const v=(Math.random()*40-20)|0;
      const cr=Math.min(255,Math.max(0,r+v));
      const cg=Math.min(255,Math.max(0,g+v));
      const cb=Math.min(255,Math.max(0,b+v));
      sandColor[i]=(255<<24)|(cb<<16)|(cg<<8)|cr;
    }
  }
}

// Check and clear full rows (sand pixel rows)
function clearFullRows() {
  let cleared = 0;
  // Check by cell row (one cell row = SS sand rows)
  for(let cy=ROWS-1;cy>=0;cy--) {
    // A row is "full" if every cell in it has its bottom sand row fully occupied
    let full = true;
    const checkRow = cy*SS + SS - 1; // bottom sand row of cell
    for(let cx=0;cx<COLS;cx++) {
      let colFull=true;
      for(let dx=0;dx<SS;dx++) {
        if(sandGrid[gidx(cx*SS+dx, checkRow)]===EMPTY){colFull=false;break;}
      }
      if(!colFull){full=false;break;}
    }
    if(full) {
      // Clear that cell row's sand pixels and drop everything above
      const sandRowStart = cy*SS;
      for(let dy=sandRowStart;dy<sandRowStart+SS;dy++) {
        for(let x=0;x<GW;x++) { sandGrid[gidx(x,dy)]=EMPTY; sandColor[gidx(x,dy)]=0; }
      }
      // Shift everything above down
      for(let sy=sandRowStart-1;sy>=0;sy--) {
        for(let x=0;x<GW;x++) {
          sandGrid[gidx(x,sy+SS)]=sandGrid[gidx(x,sy)];
          sandColor[gidx(x,sy+SS)]=sandColor[gidx(x,sy)];
          sandGrid[gidx(x,sy)]=EMPTY; sandColor[gidx(x,sy)]=0;
        }
      }
      cy++; // recheck same row
      cleared++;
    }
  }
  return cleared;
}

// ============================================================
// RENDERING
// ============================================================
const imgData = ctx.createImageData(SW, SH);
const buf = new Uint32Array(imgData.data.buffer);

// Background color packed ABGR
const BG_COLOR = 0xff14130d;

function render() {
  // Fill background
  buf.fill(BG_COLOR);

  // Draw sand
  const scaleX = SW / GW, scaleY = SH / GH; // = SAND_SCALE = 2
  for(let sy=0;sy<GH;sy++) for(let sx=0;sx<GW;sx++) {
    if(sandGrid[gidx(sx,sy)]===EMPTY) continue;
    const c = sandColor[gidx(sx,sy)];
    // Draw SAND_SCALE x SAND_SCALE block
    for(let dy=0;dy<SAND_SCALE;dy++) for(let dx=0;dx<SAND_SCALE;dx++) {
      const px=sx*SAND_SCALE+dx, py=sy*SAND_SCALE+dy;
      buf[py*SW+px] = c;
    }
  }

  // Draw ghost piece
  if(piece && state==='playing') {
    let ghostY = piece.y;
    while(!collides(piece, piece.x, ghostY+1)) ghostY++;
    if(ghostY !== piece.y) {
      for(let r=0;r<piece.shape.length;r++) for(let c=0;c<piece.shape[r].length;c++) {
        if(!piece.shape[r][c]) continue;
        const bx=(piece.x+c)*CELL, by=(ghostY+r)*CELL;
        for(let py=by;py<by+CELL;py++) for(let px=bx;px<bx+CELL;px++) {
          if(px>=0&&px<SW&&py>=0&&py<SH) {
            // ghost: faint outline only
            const edge = px===bx||px===bx+CELL-1||py===by||py===by+CELL-1;
            if(edge) buf[py*SW+px]=(0xff<<24)|(60<<16)|(60<<8)|60;
          }
        }
      }
    }

    // Draw active piece
    const [r,g,b] = piece.color;
    for(let row=0;row<piece.shape.length;row++) for(let col=0;col<piece.shape[row].length;col++) {
      if(!piece.shape[row][col]) continue;
      const bx=(piece.x+col)*CELL, by=(piece.y+row)*CELL;
      for(let py=by;py<by+CELL;py++) for(let px=bx;px<bx+CELL;px++) {
        if(px<0||px>=SW||py<0||py>=SH) continue;
        const edge2 = px===bx||px===bx+CELL-1||py===by||py===by+CELL-1;
        const inner = px>bx+1&&px<bx+CELL-2&&py>by+1&&py<by+CELL-2;
        let cr=r,cg=g,cb=b;
        if(edge2){cr=Math.min(255,r+60);cg=Math.min(255,g+60);cb=Math.min(255,b+60);}
        else if(inner){cr=r*0.7|0;cg=g*0.7|0;cb=b*0.7|0;}
        buf[py*SW+px]=(0xff<<24)|(cb<<16)|(cg<<8)|cr;
      }
    }
  }

  // Grid lines (subtle)
  for(let cy=0;cy<=ROWS;cy++) {
    const py=cy*CELL;
    if(py<SH) for(let px=0;px<SW;px++) {
      const i=py*SW+px; buf[i]= (buf[i]===BG_COLOR) ? 0xff181820 : buf[i];
    }
  }

  ctx.putImageData(imgData,0,0);

  // Draw next piece
  nctx.fillStyle='#13131e';
  nctx.fillRect(0,0,nextCanvas.width,nextCanvas.height);
  if(next) {
    const [r,g,b]=next.color;
    const offX=Math.floor((4-next.shape[0].length)/2);
    const offY=Math.floor((4-next.shape.length)/2);
    for(let row=0;row<next.shape.length;row++) for(let col=0;col<next.shape[row].length;col++) {
      if(!next.shape[row][col]) continue;
      nctx.fillStyle=`rgb(${r},${g},${b})`;
      nctx.fillRect((offX+col)*NEXT_CELL,(offY+row)*NEXT_CELL,NEXT_CELL-1,NEXT_CELL-1);
    }
  }
}

// ============================================================
// GAME LOGIC
// ============================================================
function startGame() {
  sandGrid.fill(0); sandColor.fill(0);
  score=0; level=1; lines=0; dropInterval=600;
  updateUI();
  document.getElementById('overlay').style.display='none';
  piece=null; next=null;
  spawnNext();
  state='playing';
  lastTime=performance.now();
  requestAnimationFrame(loop);
}

function endGame() {
  state='gameover';
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<h2>GAME OVER</h2><p style="color:var(--gold);font-size:16px;margin-bottom:8px">${score.toLocaleString()}</p><p style="margin-bottom:20px">スコア</p><button class="btn" id="startBtn" style="width:auto;padding:10px 30px;border-color:var(--gold);color:var(--gold)">もう一度</button>`;
  ov.style.display='flex';
  document.getElementById('startBtn').onclick=startGame;
}

function updateUI() {
  document.getElementById('scoreVal').textContent=score.toLocaleString();
  document.getElementById('levelVal').textContent=level;
  document.getElementById('linesVal').textContent=lines;
}

let sandTick=0;
const SAND_PER_FRAME=3;

function loop(now) {
  if(state!=='playing'){render();return;}
  const dt=now-lastTime; lastTime=now;

  // Sand physics multiple times per frame
  for(let i=0;i<SAND_PER_FRAME;i++) updateSand();

  // Check cleared lines
  const cleared=clearFullRows();
  if(cleared>0){
    const pts=[0,100,300,500,800][Math.min(cleared,4)]*level;
    score+=pts; lines+=cleared;
    level=Math.floor(lines/10)+1;
    dropInterval=Math.max(80, 600-level*50);
    updateUI();
  }

  // Drop piece
  dropTimer+=dt;
  if(dropTimer>=dropInterval) {
    dropTimer=0;
    if(!collides(piece,piece.x,piece.y+1)) {
      piece.y++;
    } else {
      solidifyPiece(piece);
      spawnNext();
    }
  }

  render();
  requestAnimationFrame(loop);
}

// ============================================================
// INPUT
// ============================================================
document.addEventListener('keydown', e => {
  if(state!=='playing') return;
  switch(e.code) {
    case 'ArrowLeft':
      if(!collides(piece,piece.x-1,piece.y)) piece.x--;
      e.preventDefault(); break;
    case 'ArrowRight':
      if(!collides(piece,piece.x+1,piece.y)) piece.x++;
      e.preventDefault(); break;
    case 'ArrowDown':
      if(!collides(piece,piece.x,piece.y+1)) {piece.y++;score+=1;updateUI();}
      e.preventDefault(); break;
    case 'ArrowUp': case 'KeyX': {
      const rot=rotateCW(piece.shape);
      const orig=piece.shape; piece.shape=rot;
      if(collides(piece,piece.x,piece.y)){
        // wall kick
        let kicked=false;
        for(const kick of [-1,1,-2,2]) {
          if(!collides(piece,piece.x+kick,piece.y)){piece.x+=kick;kicked=true;break;}
        }
        if(!kicked) piece.shape=orig;
      }
      e.preventDefault(); break;
    }
    case 'Space': {
      while(!collides(piece,piece.x,piece.y+1)){piece.y++;score+=2;}
      solidifyPiece(piece); spawnNext(); updateUI();
      e.preventDefault(); break;
    }
    case 'KeyP': case 'Escape':
      if(state==='playing'){state='paused';document.getElementById('pauseBtn').textContent='再開';}
      else if(state==='paused'){state='playing';lastTime=performance.now();requestAnimationFrame(loop);document.getElementById('pauseBtn').textContent='一時停止';}
      break;
  }
});

document.getElementById('startBtn').onclick = startGame;
document.getElementById('pauseBtn').onclick = () => {
  if(state==='playing'){state='paused';document.getElementById('pauseBtn').textContent='再開';}
  else if(state==='paused'){state='playing';lastTime=performance.now();requestAnimationFrame(loop);document.getElementById('pauseBtn').textContent='一時停止';}
};

// Touch / swipe controls
let touchStartX=0,touchStartY=0;
canvas.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{
  if(state!=='playing')return;
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>20&&!collides(piece,piece.x+1,piece.y))piece.x++;
    else if(dx<-20&&!collides(piece,piece.x-1,piece.y))piece.x--;
  } else {
    if(dy>20){while(!collides(piece,piece.x,piece.y+1)){piece.y++;score+=2;}solidifyPiece(piece);spawnNext();updateUI();}
    else if(dy<-20){const rot=rotateCW(piece.shape);const orig=piece.shape;piece.shape=rot;if(collides(piece,piece.x,piece.y)){let k=false;for(const kk of[-1,1,-2,2]){if(!collides(piece,piece.x+kk,piece.y)){piece.x+=kk;k=true;break;}}if(!k)piece.shape=orig;}}
  }
},{passive:true});

// Initial render
render();
</script>
</body>
</html>
