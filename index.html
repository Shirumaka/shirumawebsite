<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SIUAMXD - Complete</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithRedirect, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, updateDoc, arrayUnion, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { /* お前のAPIキーを入れろ */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const ADMIN_UID = "QPQAuqakssUodu2WqTYniJUFMBu2";

        // ログイン
        window.login = () => signInWithRedirect(auth, new GoogleAuthProvider());

        // UI表示制御
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-btn').innerText = "ログアウト";
                if (user.uid === ADMIN_UID) document.getElementById('admin-form').style.display = 'block';
            }
        });

        // 投稿機能（管理者のみ）
        window.submitPreset = async () => {
            await addDoc(collection(db, "presets"), {
                title: document.getElementById('title').value,
                desc: document.getElementById('desc').value,
                fileUrl: document.getElementById('fileUrl').value,
                gifUrl: document.getElementById('gifUrl').value,
                likes: [],
                createdAt: new Date()
            });
            alert("投稿完了");
        };

        // いいね機能
        window.toggleLike = async (id, currentLikes) => {
            if (!auth.currentUser) return alert("ログイン必須");
            const docRef = doc(db, "presets", id);
            await updateDoc(docRef, { likes: arrayUnion(auth.currentUser.uid) });
        };

        // コメント投稿
        window.postComment = async (presetId) => {
            if (!auth.currentUser) return alert("ログイン必須");
            const text = document.getElementById(`comment-${presetId}`).value;
            await addDoc(collection(db, "presets", presetId, "comments"), {
                uid: auth.currentUser.uid,
                text,
                createdAt: new Date()
            });
        };

        // リアルタイム表示（データ取得）
        onSnapshot(query(collection(db, "presets"), orderBy("createdAt", "desc")), (snap) => {
            const list = document.getElementById('presets-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const data = doc.data();
                list.innerHTML += `
                    <div style="border:1px solid #ccc; margin:10px; padding:10px;">
                        <h3>${data.title}</h3>
                        <img src="${data.gifUrl}" width="200"><br>
                        <button onclick="download('${data.fileUrl}')">Download XML</button>
                        <button onclick="toggleLike('${doc.id}')">👍 ${data.likes?.length || 0}</button>
                        <div>
                            <input id="comment-${doc.id}" placeholder="コメント...">
                            <button onclick="postComment('${doc.id}')">送信</button>
                        </div>
                    </div>
                `;
            });
        });

        window.download = (url) => { if (auth.currentUser) window.open(url); else alert("ログインしろ"); };
    </script>
</head>
<body>
    <button id="auth-btn" onclick="login()">Googleでログイン</button>
    <div id="admin-form" style="display:none; background:#eee; padding:15px;">
        <input id="title" placeholder="タイトル"><input id="desc" placeholder="説明">
        <input id="fileUrl" placeholder="XML URL"><input id="gifUrl" placeholder="GIF URL">
        <button onclick="submitPreset()">投稿</button>
    </div>
    <div id="presets-list"></div>
</body>
</html>
