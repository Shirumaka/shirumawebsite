<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SIUAMXD Community</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    background:#000;
    color:white;
    overflow:hidden;
}

.container{
    height:100vh;
    overflow-y:auto;
    scroll-snap-type:y mandatory;
}

.card{
    position:relative;
    width:100%;
    height:100vh;
    scroll-snap-align:start;
    overflow:hidden;
    background:#111;
}

.preview{
    width:100%;
    height:100%;
    object-fit:cover;
}

.overlay{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    padding:20px;
    background:linear-gradient(
        transparent,
        rgba(0,0,0,0.8)
    );
}

.author{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
}

.author img{
    width:45px;
    height:45px;
    border-radius:50%;
}

.title{
    font-size:24px;
    font-weight:bold;
    margin-bottom:10px;
}

.desc{
    opacity:0.9;
    margin-bottom:15px;
}

.actions{
    display:flex;
    gap:10px;
}

button{
    border:none;
    border-radius:10px;
    padding:12px 16px;
    background:#3d5afe;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#536dfe;
}

.topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:999;
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(10px);
}

.like{
    color:#ff4081;
    font-weight:bold;
    cursor:pointer;
}

#uploadPanel{
    position:fixed;
    top:70px;
    right:15px;
    width:320px;
    background:#111;
    padding:15px;
    border-radius:15px;
    display:none;
    z-index:999;
}

input{
    width:100%;
    margin-bottom:10px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#222;
    color:white;
}

</style>
</head>
<body>

<div class="topbar">

    <button id="loginBtn">
        Googleログイン
    </button>

    <button id="logoutBtn" style="display:none;">
        ログアウト
    </button>

    <button id="openUploadBtn" style="display:none;">
        投稿
    </button>

</div>

<div id="uploadPanel">

    <input
    type="text"
    id="title"
    placeholder="タイトル">

    <input
    type="text"
    id="desc"
    placeholder="説明">

    <input
    type="text"
    id="gifUrl"
    placeholder="GIF URL">

    <input
    type="text"
    id="xmlUrl"
    placeholder="XML URL">

    <button id="uploadBtn">
        投稿する
    </button>

</div>

<div class="container" id="feed"></div>

<script type="module">

import {
    initializeApp
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
    getAuth,
    GoogleAuthProvider,
    signInWithPopup,
    signOut,
    onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot,
    query,
    orderBy,
    serverTimestamp,
    updateDoc,
    doc,
    arrayUnion,
    arrayRemove
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


const firebaseConfig = {

    apiKey:
    "AIzaSyADIlXZrVXBp7AqzQcFP9UUveg1Q5TXTcM",

    authDomain:
    "siuamxd-login.firebaseapp.com",

    projectId:
    "siuamxd-login",

    storageBucket:
    "siuamxd-login.firebasestorage.app",

    messagingSenderId:
    "682121103941",

    appId:
    "1:682121103941:web:b8480d5eb9d8e0cf75712c"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

const loginBtn =
document.getElementById("loginBtn");

const logoutBtn =
document.getElementById("logoutBtn");

const openUploadBtn =
document.getElementById("openUploadBtn");

const uploadPanel =
document.getElementById("uploadPanel");

const uploadBtn =
document.getElementById("uploadBtn");

const feed =
document.getElementById("feed");


// ログイン
loginBtn.onclick = async () => {

    try{

        await signInWithPopup(
            auth,
            new GoogleAuthProvider()
        );

    }catch(err){

        console.error(err);
        alert("ログイン失敗");

    }

};


// ログアウト
logoutBtn.onclick = async () => {

    await signOut(auth);

};


// 投稿パネル
openUploadBtn.onclick = () => {

    uploadPanel.style.display =
        uploadPanel.style.display === "block"
        ? "none"
        : "block";

};


// ログイン状態
onAuthStateChanged(auth,(user)=>{

    if(user){

        loginBtn.style.display = "none";

        logoutBtn.style.display = "block";

        openUploadBtn.style.display = "block";

    }else{

        loginBtn.style.display = "block";

        logoutBtn.style.display = "none";

        openUploadBtn.style.display = "none";

        uploadPanel.style.display = "none";

    }

});


// 投稿
uploadBtn.onclick = async () => {

    if(!auth.currentUser){

        alert("ログインしてください");
        return;

    }

    try{

        const title =
        document.getElementById("title").value;

        const desc =
        document.getElementById("desc").value;

        const gifUrl =
        document.getElementById("gifUrl").value;

        const xmlUrl =
        document.getElementById("xmlUrl").value;

        if(
            !title ||
            !desc ||
            !gifUrl ||
            !xmlUrl
        ){

            alert("全部入力してください");
            return;

        }

        await addDoc(
            collection(db,"presets"),
            {

                title,
                desc,
                gifUrl,
                xmlUrl,

                author:
                auth.currentUser.displayName,

                authorPhoto:
                auth.currentUser.photoURL,

                likes:[],

                createdAt:
                serverTimestamp()

            }
        );

        alert("投稿完了");

    }catch(err){

        console.error(err);
        alert("投稿失敗");

    }

};


// いいね
window.toggleLike =
async(id,liked)=>{

    if(!auth.currentUser){

        alert("ログインしてください");
        return;

    }

    const postRef =
    doc(db,"presets",id);

    await updateDoc(postRef,{

        likes: liked
            ? arrayRemove(
                auth.currentUser.uid
            )
            : arrayUnion(
                auth.currentUser.uid
            )

    });

};


// フィード表示
const q = query(
    collection(db,"presets"),
    orderBy("createdAt","desc")
);

onSnapshot(q,(snapshot)=>{

    feed.innerHTML = "";

    snapshot.forEach((docSnap)=>{

        const d = docSnap.data();

        const liked =
        d.likes?.includes(
            auth.currentUser?.uid
        );

        feed.innerHTML += `

        <div class="card">

            <img
            class="preview"
            src="${d.gifUrl}">

            <div class="overlay">

                <div class="author">

                    <img
                    src="${d.authorPhoto}">

                    <span>
                        ${d.author}
                    </span>

                </div>

                <div class="title">
                    ${d.title}
                </div>

                <div class="desc">
                    ${d.desc}
                </div>

                <div class="actions">

                    <a
                    href="${d.xmlUrl}"
                    target="_blank">

                        <button>
                            Download XML
                        </button>

                    </a>

                    <div
                    class="like"
                    onclick="
                    toggleLike(
                        '${docSnap.id}',
                        ${liked}
                    )">

                        ${liked ? "💖" : "❤️"}

                        ${d.likes?.length || 0}

                    </div>

                </div>

            </div>

        </div>

        `;

    });

});

</script>

</body>
</html>
