<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>SIUAMXD</title>
</head>
<body>
    <header id="user-area">Loading...</header>
    <main class="grid" id="grid"></main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADIlXZrVXBp7AqzQcFP9UUveg1Q5TXTcM",
            authDomain: "siuamxd-login.firebaseapp.com",
            projectId: "siuamxd-login",
            storageBucket: "siuamxd-login.firebasestorage.app",
            messagingSenderId: "682121103941",
            appId: "1:682121103941:web:b8480d5eb9d8e0cf75712c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ログイン状態に応じた画面切り替え
        onAuthStateChanged(auth, async (user) => {
            const userArea = document.getElementById('user-area');
            const grid = document.getElementById('grid');

            // ヘッダー制御
            userArea.innerHTML = user ? 
                `<span>ようこそ ${user.displayName}</span> <button onclick="window.location.reload()">ログアウト</button>` :
                `<button onclick="signInWithPopup(auth, new GoogleAuthProvider())">Googleログイン</button>`;

            // データ取得
            const snapshots = await getDocs(collection(db, "presets"));
            grid.innerHTML = "";
            snapshots.forEach((doc) => {
                const d = doc.data();
                grid.innerHTML += `
                    <div class="card">
                        <h3>${d.title}</h3>
                        <p>${d.desc || ''}</p>
                        ${user ? `<a href="${d.fileUrl}" class="dl-btn">DOWNLOAD XML</a>` : '<p style="color:#666;">ログインで表示</p>'}
                    </div>`;
            });
        });
    </script>
</body>
</html>
